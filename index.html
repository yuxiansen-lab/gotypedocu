<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速入门</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@1.0.2/dist/css/mdui.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="mdui-appbar-with-toolbar mdui-drawer-body-left mdui-theme-primary-blue">

    <header class="mdui-appbar mdui-appbar-fixed">
        <div class="mdui-toolbar mdui-color-white">
            <span class="mdui-btn mdui-btn-icon mdui-ripple" mdui-drawer="{target: '#main-drawer'}"><i class="mdui-icon material-icons">menu</i></span>
            <span class="mdui-typo-headline mdui-hidden-xs">加载中...</span>
            <span class="mdui-typo-title">快速入门</span>
            <div class="mdui-toolbar-spacer"></div>
            <a id="github-link" href="#" class="mdui-btn mdui-btn-icon mdui-ripple"><i class="mdui-icon material-icons">code</i></a>
        </div>
    </header>

    <div class="mdui-drawer" id="main-drawer">
        <div class="mdui-list">
            </div>
    </div>

    <main class="mdui-container" id="main-content">
        <div class="doc-card mdui-typo">
            <h1>快速入门</h1>
            <p>这是首页内容。你可以按照这个模板创建 <code>about.html</code> 等其他页面。</p>
            <pre><code>npm install mdui-docs</code></pre>
        </div>
    </main>

    <script src="https://unpkg.com/mdui@1.0.2/dist/js/mdui.min.js"></script>
    <script src="config.js"></script>
</body>
</html>
